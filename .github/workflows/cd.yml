name: CD — Deploy to QA / Prod

on:
  push:
    branches: [ "main" ]
  release:
    types: [ published ]

permissions:
  id-token: write
  contents: read

jobs:
  decide-environment:
    runs-on: ubuntu-latest
    outputs:
      env: ${{ steps.context.outputs.env }}
      image_tag: ${{ steps.context.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Decide environment and image tag
        id: context
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "Deploying to PRODUCTION"
            echo "env=prod" >> $GITHUB_OUTPUT
            echo "image_tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "Deploying to QA"
            echo "env=qa" >> $GITHUB_OUTPUT
            echo "image_tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT   # short commit sha
          fi

  build-and-push:
    needs: decide-environment
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ vars.ECR_REGISTRY }}/${{ vars.IMAGE_NAME }}:${{ needs.decide-environment.outputs.image_tag }}

  deploy:
    needs: [decide-environment, build-and-push]
    runs-on: ubuntu-latest
    name: Deploy to ${{ needs.decide-environment.outputs.env }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Deploy to ECS (force new deployment)
        run: |
          aws ecs update-service \
            --cluster ${{ vars.ECS_CLUSTER }} \
            --service ${{ vars.ECS_SERVICE }} \
            --force-new-deployment \
            --region ${{ vars.AWS_REGION }}