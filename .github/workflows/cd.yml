name: CD — Deploy to QA / Prod

on:
  push:
    branches: [ "main" ]
  release:
    types: [ published ]

permissions:
  id-token: write
  contents: read

jobs:
  decide-environment:
    runs-on: ubuntu-latest
    outputs:
      env: ${{ steps.context.outputs.env }}
      image_tag: ${{ steps.context.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Decide environment and image tag
        id: context
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "Deploying to PRODUCTION"
            echo "env=prod" >> $GITHUB_OUTPUT
            echo "image_tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "Deploying to QA"
            echo "env=qa" >> $GITHUB_OUTPUT
            echo "image_tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT   # short commit sha
          fi

  build-and-deploy:
    needs: decide-environment
    runs-on: ubuntu-latest
    name: Build & Deploy to ${{ needs.decide-environment.outputs.env }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ vars.ECR_REGISTRY }}/${{ vars.IMAGE_NAME }}:${{ needs.decide-environment.outputs.image_tag }}

      - name: Download current task definition
        run: |
          echo "Downloading task definition: ${{ vars.ECS_TASK_DEFINITION }}"
          aws ecs describe-task-definition \
            --task-definition ${{ vars.ECS_TASK_DEFINITION }} \
            --query 'taskDefinition' \
            --output json > task-definition.json

          # Show the file content for debugging (you can remove this later)
          echo "=== Task definition content ==="
          cat task-definition.json | head -n 50

      - name: Clean task definition for registration
        run: |
          cat task-definition.json | jq 'del(
            .taskDefinitionArn,
            .requiresAttributes,
            .compatibilities,
            .revision,
            .status,
            .registeredAt,
            .registeredBy,
            .deregisteredAt,
            .deprecatedAt,
            .taskDefinitionArn
          )' > cleaned-task-definition.json

          # Rename for the next step
          mv cleaned-task-definition.json task-definition.json

      - name: Render new task definition with our image
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ vars.CONTAINER_NAME }}   
          image: ${{ vars.ECR_REGISTRY }}/${{ vars.IMAGE_NAME }}:${{ needs.decide-environment.outputs.image_tag }}  

      - name: Deploy to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          service: ${{ vars.ECS_SERVICE }}
          cluster: ${{ vars.ECS_CLUSTER }}
          wait-for-service-stability: true